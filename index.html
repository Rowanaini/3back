<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-Back 记忆力挑战 Pro - AI Powered</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --primary-color: #38bdf8;
            --success-color: #22c55e;
            --error-color: #ef4444;
            --accent-color: #6366f1;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 游戏进度条 */
        #progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
            transition: width 0.3s ease;
        }

        /* HUD 信息 */
        #hud {
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            opacity: 0.8;
            display: flex;
            gap: 20px;
        }

        #n-display { color: var(--accent-color); }
        #combo-display { color: var(--primary-color); }

        /* 游戏核心区域 */
        #game-container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            cursor: pointer;
        }

        #letter {
            font-size: 150px;
            font-weight: 800;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
            text-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        @keyframes scaleIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        .animate-in { animation: scaleIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .animate-out { animation: fadeOut 0.3s ease forwards; }

        /* 全屏遮罩层 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            z-index: 200;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .config-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        h1 { font-size: 2rem; color: var(--primary-color); margin-top: 0; }
        h2 { font-size: 1.2rem; color: var(--accent-color); margin-top: 0; }
        
        .setting-item { margin: 20px 0; text-align: left; }
        .setting-item label { display: block; margin-bottom: 10px; color: #94a3b8; font-size: 0.9rem; }
        
        input[type="range"] {
            width: 100%;
            accent-color: var(--primary-color);
            cursor: pointer;
        }

        .val-preview { float: right; color: var(--text-color); font-weight: bold; }

        .btn {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.4);
        }

        /* 教程专用样式 */
        .tutorial-step {
            text-align: left;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        .tutorial-visual {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 15px;
            margin: 10px 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-family: monospace;
            font-size: 1.2rem;
        }
        .highlight-match {
            border: 2px solid var(--success-color);
            padding: 5px 10px;
            border-radius: 8px;
            color: var(--success-color);
            font-weight: bold;
            position: relative;
        }
        .highlight-match::after {
            content: "MATCH!";
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }

        .stat-mini {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-mini .val { font-size: 1.5rem; font-weight: bold; display: block; }
        .stat-mini .lbl { font-size: 0.75rem; color: #64748b; }

        /* AI 评价样式 */
        #ai-feedback {
            margin-top: 15px;
            padding: 15px;
            background: rgba(99, 102, 241, 0.1);
            border-left: 4px solid var(--accent-color);
            border-radius: 8px;
            font-size: 0.9rem;
            line-height: 1.5;
            text-align: left;
            color: #cbd5e1;
        }

        #ai-motto {
            font-style: italic;
            color: var(--primary-color);
            margin: 15px 0;
            min-height: 1.5em;
            font-size: 0.95rem;
        }

        .help-icon {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .help-icon:hover { opacity: 1; }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            #letter { font-size: 120px; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div id="hud">
        <div id="n-display">N-Back: 3</div>
        <div id="combo-display">Combo: 0</div>
    </div>

    <div id="game-container">
        <div id="letter"></div>
    </div>

    <!-- 教程遮罩层 -->
    <div id="tutorial-overlay" class="overlay hidden">
        <h1>如何进行训练？</h1>
        <div class="config-card">
            <div class="tutorial-step">
                <h2>1. 核心规则</h2>
                <p>当当前显示的字母与 <b>N 个步长之前</b>显示的字母相同时，即为“匹配”。</p>
            </div>
            
            <div class="tutorial-step">
                <h2>2. 以 2-Back 为例</h2>
                <div class="tutorial-visual">
                    <span>A</span> <span>B</span> <span class="highlight-match">A</span> <span>C</span>
                </div>
                <p>第二个 A 出现了。因为它与它前面的第 2 个字母（第一个 A）一样，所以应立即点击屏幕或按空格。</p>
            </div>

            <div class="tutorial-step">
                <h2>3. 操作方式</h2>
                <p>📱 手机：点击屏幕；💻 电脑：按 <b>[空格]</b>。</p>
            </div>
        </div>
        <button class="btn" onclick="closeTutorial()">我明白了</button>
    </div>

    <!-- 开始界面 -->
    <div id="start-screen" class="overlay">
        <div class="help-icon" onclick="openTutorial()">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
        </div>
        <h1>3-Back 记忆训练 Pro</h1>
        
        <div id="ai-motto">正在生成 AI 每日挑战语...</div>

        <div class="config-card">
            <div class="setting-item">
                <label>难度等级 (N-Back) <span class="val-preview" id="n-val">3</span></label>
                <input type="range" id="n-slider" min="1" max="5" step="1" value="3">
            </div>
            <div class="setting-item">
                <label>字母间隔 (秒) <span class="val-preview" id="speed-val">2.0s</span></label>
                <input type="range" id="speed-slider" min="0.5" max="3.0" step="0.1" value="2.0">
            </div>
        </div>

        <div class="config-card">
            <label style="color: #94a3b8; font-size: 0.8rem; margin-bottom: 10px; display: block;">历史最佳 (Best Record)</label>
            <div id="high-score-board" style="font-size: 0.9rem; line-height: 1.8;">暂无记录</div>
        </div>

        <button class="btn" onclick="startGame()">立即开始</button>
    </div>

    <!-- 结果界面 -->
    <div id="result-screen" class="overlay hidden">
        <h1>训练报告</h1>
        <div class="chart-container" style="width:100%; max-width:500px; height:180px;">
            <canvas id="growthChart"></canvas>
        </div>
        
        <div class="stats-grid">
            <div class="stat-mini"><span id="res-correct" class="val" style="color:var(--success-color)">0</span><span class="lbl">正确</span></div>
            <div class="stat-mini"><span id="res-missed" class="val" style="color:#f59e0b">0</span><span class="lbl">漏选</span></div>
            <div class="stat-mini"><span id="res-wrong" class="val" style="color:var(--error-color)">0</span><span class="lbl">误触</span></div>
            <div class="stat-mini"><span id="res-accuracy" class="val">0%</span><span class="lbl">准确率</span></div>
        </div>

        <div class="config-card" id="ai-feedback-container">
            <h2 style="font-size: 1rem; margin-bottom: 10px;">✨ AI 深度分析 (Gemini)</h2>
            <div id="ai-feedback">正在分析你的表现...</div>
            <button class="btn" id="ai-retry-btn" onclick="fetchAIFeedback()" style="padding: 8px 20px; font-size: 0.8rem; display: none;">重新生成</button>
        </div>

        <button class="btn" onclick="showStartScreen()">返回主菜单</button>
    </div>

    <script>
        // API 设置
        const apiKey = ""; // 环境变量会自动注入
        const MODEL_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent";

        const letterEl = document.getElementById('letter');
        const progressBar = document.getElementById('progress-bar');
        const comboEl = document.getElementById('combo-display');
        const nEl = document.getElementById('n-display');
        const startScreen = document.getElementById('start-screen');
        const resultScreen = document.getElementById('result-screen');
        const tutorialOverlay = document.getElementById('tutorial-overlay');
        const aiMottoEl = document.getElementById('ai-motto');
        const aiFeedbackEl = document.getElementById('ai-feedback');
        
        const nSlider = document.getElementById('n-slider');
        const speedSlider = document.getElementById('speed-slider');
        const nValPreview = document.getElementById('n-val');
        const speedValPreview = document.getElementById('speed-val');

        let config = { n: 3, interval: 2000, total: 30 }; // 为了演示稍微缩短了总数
        let sequence = [];
        let currentIndex = -1;
        let gameTimer = null;
        let hasReacted = false;
        let stats = { correct: 0, missed: 0, wrong: 0, combo: 0, maxCombo: 0, history: [] };
        let chartInstance = null;

        nSlider.oninput = () => { nValPreview.textContent = nSlider.value; config.n = parseInt(nSlider.value); };
        speedSlider.oninput = () => { speedValPreview.textContent = speedSlider.value + 's'; config.interval = speedSlider.value * 1000; };

        // --- Gemini API 集成 ---

        async function callGemini(prompt, systemPrompt = "你是一个认知训练专家和激励教练。") {
            let retries = 0;
            const maxRetries = 5;
            const delays = [1000, 2000, 4000, 8000, 16000];

            while (retries < maxRetries) {
                try {
                    const response = await fetch(`${MODEL_URL}?key=${apiKey}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "暂无 AI 响应";
                } catch (error) {
                    retries++;
                    if (retries === maxRetries) throw error;
                    await new Promise(res => setTimeout(res, delays[retries-1]));
                }
            }
        }

        async function fetchAIMotto() {
            try {
                const bestAcc = stats.history.length > 0 ? Math.max(...stats.history.map(h => h.acc)) : 0;
                const prompt = `玩家目前最高准确率是 ${bestAcc}%。请生成一句简短的激励性话语，风格要酷炫、赛博朋克且专业，不要超过20个字。`;
                const motto = await callGemini(prompt);
                aiMottoEl.textContent = motto;
            } catch (e) {
                aiMottoEl.textContent = "超越昨日的自己，掌控思维。";
            }
        }

        async function fetchAIFeedback() {
            aiFeedbackEl.innerHTML = '<div class="loading-spinner"></div>正在通过 Gemini 分析数据...';
            document.getElementById('ai-retry-btn').style.display = 'none';
            
            try {
                const totalMatches = sequence.filter((l, i) => i >= config.n && l === sequence[i-config.n]).length;
                const accuracy = totalMatches > 0 ? Math.round((stats.correct / totalMatches) * 100) : 0;
                
                const prompt = `
                训练参数：N-Back=${config.n}, 速度=${config.interval}ms。
                表现：正确=${stats.correct}/${totalMatches}, 漏选=${stats.missed}, 误触=${stats.wrong}, 最大连击=${stats.maxCombo}。
                请用客观且鼓励的语言评价这次训练，并给出一个实用的工作记忆提升小建议。字数100字左右。
                `;
                
                const feedback = await callGemini(prompt, "你是一个认知神经科学专家，擅长分析 N-back 训练数据并给建议。");
                aiFeedbackEl.textContent = feedback;
            } catch (e) {
                aiFeedbackEl.textContent = "AI 分析暂时离线，但你的努力已被记录。建议：保持呼吸频率，尝试扩大视觉注意窗口。";
                document.getElementById('ai-retry-btn').style.display = 'inline-block';
            }
        }

        // --- 游戏逻辑 ---

        function loadStats() {
            const data = localStorage.getItem('nback_stats');
            if (data) stats.history = JSON.parse(data);
            if (!localStorage.getItem('nback_tutorial_seen')) openTutorial();
            updateHighScoreBoard();
            fetchAIMotto();
        }

        function openTutorial() { tutorialOverlay.classList.remove('hidden'); }
        function closeTutorial() { tutorialOverlay.classList.add('hidden'); localStorage.setItem('nback_tutorial_seen', 'true'); }

        function updateHighScoreBoard() {
            const board = document.getElementById('high-score-board');
            if (stats.history.length === 0) return;
            const bests = {};
            stats.history.forEach(h => {
                if (!bests[h.n] || h.acc > bests[h.n]) bests[h.n] = h.acc;
            });
            board.innerHTML = Object.keys(bests).sort().map(n => `<span>Lvl ${n}: <b>${bests[n]}%</b></span>`).join(' | ');
        }

        function generateSequence() {
            const letters = "ABCDEFGHJKLMNPQRSTUVWXYZ"; 
            const seq = [];
            for (let i = 0; i < config.total; i++) {
                if (i >= config.n && Math.random() < 0.35) { // 提高匹配概率使数据更有趣
                    seq.push(seq[i - config.n]);
                } else {
                    let char;
                    do { char = letters[Math.floor(Math.random() * letters.length)]; }
                    while (i >= config.n && char === seq[i - config.n]);
                    seq.push(char);
                }
            }
            return seq;
        }

        function showStartScreen() {
            resultScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
            loadStats();
        }

        function startGame() {
            startScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
            sequence = generateSequence();
            currentIndex = -1;
            stats.correct = 0; stats.missed = 0; stats.wrong = 0; stats.combo = 0; stats.maxCombo = 0;
            nEl.textContent = `N-Back: ${config.n}`;
            updateComboUI();
            nextStep();
        }

        function nextStep() {
            // 检查上一轮是否漏选
            if (currentIndex >= config.n && !hasReacted && sequence[currentIndex] === sequence[currentIndex - config.n]) {
                stats.missed++;
                stats.combo = 0;
                updateComboUI();
            }

            currentIndex++;
            if (currentIndex >= config.total) {
                endGame();
                return;
            }

            hasReacted = false;
            letterEl.textContent = sequence[currentIndex];
            letterEl.style.color = "var(--text-color)";
            letterEl.classList.remove('animate-in', 'animate-out');
            void letterEl.offsetWidth;
            letterEl.classList.add('animate-in');
            
            setTimeout(() => letterEl.classList.add('animate-out'), config.interval * 0.85);
            progressBar.style.width = ((currentIndex + 1) / config.total * 100) + "%";
            gameTimer = setTimeout(nextStep, config.interval);
        }

        function handleInput() {
            if (currentIndex < 0 || currentIndex >= config.total || hasReacted) return;
            hasReacted = true;
            const isMatch = currentIndex >= config.n && sequence[currentIndex] === sequence[currentIndex - config.n];
            if (isMatch) {
                stats.correct++;
                stats.combo++;
                if (stats.combo > stats.maxCombo) stats.maxCombo = stats.combo;
                letterEl.style.color = "var(--success-color)";
            } else {
                stats.wrong++;
                stats.combo = 0;
                letterEl.style.color = "var(--error-color)";
            }
            updateComboUI();
        }

        function updateComboUI() { comboEl.textContent = `Combo: ${stats.combo}`; }

        function endGame() {
            clearTimeout(gameTimer);
            const totalMatches = sequence.filter((l, i) => i >= config.n && l === sequence[i-config.n]).length;
            const accuracy = totalMatches > 0 ? Math.round((stats.correct / totalMatches) * 100) : 0;
            
            stats.history.push({ date: new Date().toLocaleTimeString(), n: config.n, acc: accuracy });
            if (stats.history.length > 20) stats.history.shift();
            localStorage.setItem('nback_stats', JSON.stringify(stats.history));
            
            document.getElementById('res-correct').textContent = stats.correct;
            document.getElementById('res-missed').textContent = stats.missed;
            document.getElementById('res-wrong').textContent = stats.wrong;
            document.getElementById('res-accuracy').textContent = accuracy + "%";
            
            resultScreen.classList.remove('hidden');
            renderChart();
            fetchAIFeedback(); // 结束时自动获取分析
        }

        function renderChart() {
            const ctx = document.getElementById('growthChart').getContext('2d');
            const lastData = stats.history.slice(-10);
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: lastData.map((_, i) => i + 1),
                    datasets: [{
                        label: '准确率 (%)',
                        data: lastData.map(d => d.acc),
                        borderColor: '#38bdf8',
                        backgroundColor: 'rgba(56, 189, 248, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { min: 0, max: 100, grid: { color: 'rgba(255,255,255,0.05)' } },
                        x: { display: false }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        window.addEventListener('keydown', (e) => { if (e.code === 'Space') { e.preventDefault(); handleInput(); } });
        document.getElementById('game-container').addEventListener('mousedown', (e) => { e.preventDefault(); handleInput(); });
        document.getElementById('game-container').addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(); });

        window.onload = loadStats;
    </script>
</body>
</html>
